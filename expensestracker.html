        </div>

        <form action="">
            <div class="container">
                <h5>INFORAMTIONS</h5>
                <div class="form-control">
                    <div class="d-flex">
                        <label for="budget">BUDGET : </label>
                        <div class="budget"></div>
                    </div>
                </div>
                <input type="text " class="form-control" placeholder="ITEM NAME" id="itemname">
                <div class="d-flex gap-3">
                    <input type="text " class="form-control " placeholder="ITEM PRICE" id="itemprice">
                    <input type="text" class="form-control"  placeholder="QUANTITY" id="itemquantity">
                </div>
                
            </div>
             <button type="button" class="btn btn-dark" onclick="compute()" >calculate</button>
             <button type="button" class="btn btn-dark" onclick="clearTable()" >clear</button>
        </form>
    </div>
  <div class=" w-50 form-control">
      <table class="container">
        <thead>
          <tr>
            <th>ITEM NAME</th>
            <th>PRICE</th>
            <th>QUANTITY</th>
            <th>TOTAL</th>
          </tr>
        </thead>
        <tbody id="items"></tbody>
          
   

      </table>

<style>
  table,th,td{
    margin: 0;
    border: solid 1px rgba(0, 0, 0, .15);
    border-collapse: collapse;
  }
  td{
    color: black;
    font-family: poppins;
  }
    .color{
          color: var(--bs-body-color) !important;
    }
    .marginer{
        margin: 20px;
    }
</style>
    <script>
        document.getElementById("items").innerHTML = localStorage.getItem("tabledata");
        function compute(){
            const itemname = document.getElementById("itemname").value;
            const itemprice = document.getElementById("itemprice").value;
            const itemquantity= document.getElementById("itemquantity").value;
            const total = itemprice * itemquantity;
            
            const items = document.getElementById("items").innerHTML += `
              <tr>
                <td>${itemname}</td>
                <td>${itemprice}</td>
                <td>${itemquantity}</td>
                <td>${total}</td>
              </tr>
            `;
              localStorage.setItem("tabledata", document.getElementById("items").innerHTML);

              document.getElementById("itemname").value = "";
              document.getElementById("itemprice").value = "";
              document.getElementById("itemquantity").value = "";
        }
        function clearTable(){
          localStorage.removeItem("tabledata");
          document.getElementById("items").innerHTML = "";
        }

        
    </script>
